name: Sync Main to Develop

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create sync PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="sync/main-to-develop"
          git checkout -b "$BRANCH" origin/main
          git push -f origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --base develop --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists"
          else
            gh pr create \
              --base develop \
              --head "$BRANCH" \
              --title "Sync main to develop" \
              --body "Automated PR to bring release version bump back into develop."
          fi
