name: Prepare Staging Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (leave blank to keep current)'
        required: false
        type: string

jobs:
  prepare-release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current version info
        id: current
        run: |
          cd PlayolaRadio.xcodeproj
          CURRENT_VERSION=$(agvtool what-marketing-version -terse1)
          CURRENT_BUILD=$(agvtool what-version -terse)
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "build=$CURRENT_BUILD" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION ($CURRENT_BUILD)"

      - name: Increment build number
        run: |
          cd PlayolaRadio.xcodeproj
          agvtool next-version -all
          NEW_BUILD=$(agvtool what-version -terse)
          echo "New build number: $NEW_BUILD"

      - name: Update version (if provided)
        if: ${{ inputs.version != '' }}
        run: |
          cd PlayolaRadio.xcodeproj
          agvtool new-marketing-version ${{ inputs.version }}
          echo "Updated version to: ${{ inputs.version }}"

      - name: Get new version info
        id: new
        run: |
          cd PlayolaRadio.xcodeproj
          NEW_VERSION=$(agvtool what-marketing-version -terse1)
          NEW_BUILD=$(agvtool what-version -terse)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "build=$NEW_BUILD" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump staging build to ${{ steps.new.outputs.version }} (${{ steps.new.outputs.build }})"
          git push

      - name: Summary
        run: |
          echo "## Staging Release Prepared" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Before | After |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.current.outputs.version }} | ${{ steps.new.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ steps.current.outputs.build }} | ${{ steps.new.outputs.build }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. \`git pull\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Archive **PlayolaRadio-Staging** scheme in Xcode" >> $GITHUB_STEP_SUMMARY
          echo "3. Upload to TestFlight" >> $GITHUB_STEP_SUMMARY
