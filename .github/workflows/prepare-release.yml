name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version update type'
        required: true
        default: 'none'
        type: choice
        options:
          - none
          - patch
          - minor
          - major

jobs:
  trigger-circleci:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CircleCI Pipeline
        id: trigger
        uses: CircleCI-Public/trigger-circleci-pipeline-action@v1.2.0
        with:
          GHA_Meta: ${{ inputs.version_bump }}
        env:
          CCI_TOKEN: ${{ secrets.CCI_TOKEN }}

      - name: Show CircleCI Link
        run: |
          echo "## 🚀 Release Pipeline Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pipeline #${{ steps.trigger.outputs.number }}** is now running on CircleCI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "👉 [**View Pipeline Progress**](https://app.circleci.com/pipelines/github/${{ github.repository }}/${{ steps.trigger.outputs.number }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.version_bump }}" != "none" ]; then
            echo "**Version bump:** ${{ inputs.version_bump }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Version:** (keeping current)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps (after CircleCI completes):" >> $GITHUB_STEP_SUMMARY
          echo "1. \`git pull\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Archive **PlayolaRadio-Staging** → Upload to TestFlight" >> $GITHUB_STEP_SUMMARY
          echo "3. Archive **PlayolaRadio** → Upload to App Store Connect" >> $GITHUB_STEP_SUMMARY
