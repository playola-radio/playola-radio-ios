version: 2.1

jobs:
  swiftlint_check:
    macos:
      xcode: 26.2
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Install Bundler
          command: gem install bundler
      - run:
          name: Install Fastlane
          command: bundle install
      - run:
          name: Install SwiftLint (Homebrew)
          command: brew install swiftlint
      - run:
          name: Run SwiftLint via Fastlane
          command: bundle exec fastlane lint_code
      - run:
          name: Run Swift Format Check
          command: bundle exec fastlane format_check

  build-and-test:
    macos:
      xcode: 26.2
    resource_class: m4pro.medium
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: test
    steps:
      - checkout
      - run: brew install xcbeautify
      - run: cp ./PlayolaRadio/Config/Secrets-Example.xcconfig ./PlayolaRadio/Config/Secrets.xcconfig
      - run: cp ./PlayolaRadio/Config/Secrets-Example.xcconfig ./PlayolaRadio/Config/Secrets-Development.xcconfig
      - run: cp ./PlayolaRadio/Config/Secrets-Example.xcconfig ./PlayolaRadio/Config/Secrets-Local.xcconfig
      - run: cp ./PlayolaRadio/Config/Secrets-Example.xcconfig ./PlayolaRadio/Config/Secrets-Staging.xcconfig
      - run: bundle install
      - run:
          name: Resolve Swift Package Dependencies
          command: xcodebuild -resolvePackageDependencies -project PlayolaRadio.xcodeproj
      - run:
          name: Fastlane
          command: bundle exec fastlane $FASTLANE_LANE
      - store_artifacts:
          path: output
      - store_test_results:
          path: "./fastlane/test_output"
      - store_test_results:
          path: test-results

  release_build:
    macos:
      xcode: 26.2
    resource_class: m4pro.medium
    steps:
      - checkout
      - run:
          name: Set up SSH for match (fastlane-match-certs-and-profiles)
          command: |
            mkdir -p ~/.ssh
            chmod 700 ~/.ssh
            printf '%s' "$MATCH_GIT_PRIVATE_KEY_B64" | base64 --decode > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan github.com >> ~/.ssh/known_hosts
      - run:
          name: Install Bundler
          command: gem install bundler
      - run:
          name: Install Fastlane
          command: bundle install
      - run:
          name: Install xcbeautify
          command: brew install xcbeautify
      - run:
          name: Decode xcconfig secrets
          command: bash scripts/ci-write-secrets.sh
      - run:
          name: Resolve Swift Package Dependencies
          command: xcodebuild -resolvePackageDependencies -project PlayolaRadio.xcodeproj
      - run:
          name: Fastlane release_production (build + upload to TestFlight + Sentry dSYMs)
          command: bundle exec fastlane release_production
      - store_artifacts:
          path: build
      - store_test_results:
          path: fastlane/test_output

  adhoc:
    macos:
      xcode: 26.2
    resource_class: m4pro.medium
    environment:
      FL_OUTPUT_DIR: output
      FASTLANE_LANE: adhoc
    steps:
      - checkout
      - run: brew install xcbeautify
      - run: cp ./PlayolaRadio/Config/Secrets-Example.xcconfig ./PlayolaRadio/Config/Secrets.xcconfig
      - run: cp ./PlayolaRadio/Config/Secrets-Example.xcconfig ./PlayolaRadio/Config/Secrets-Development.xcconfig
      - run: cp ./PlayolaRadio/Config/Secrets-Example.xcconfig ./PlayolaRadio/Config/Secrets-Local.xcconfig
      - run: bundle install
      - run:
          name: Fastlane
          command: bundle exec fastlane $FASTLANE_LANE
      - store_artifacts:
          path: output
      - store_test_results:
          path: test-results

workflows:
  lint-codebase:
    jobs:
      - swiftlint_check

  build-test-adhoc:
    jobs:
      - build-and-test
      - adhoc:
          filters:
            branches:
              only: development
          requires:
            - build-and-test

  release:
    jobs:
      - release_build:
          context: ios-release
          filters:
            tags:
              only: /^v.*/
            branches:
              ignore: /.*/
